name: Precise Constructs Sync

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  populate-constructs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Sync Constructs Assets
        run: |
          cat << 'EOF' > constructs_sync.py
          import os
          import time
          import urllib.request
          import ssl
          
          ssl._create_default_https_context = ssl._create_unverified_context
          GITHUB_USER = "Devanik21"
          
          # Exact mapping from source_repo.md files
          CONSTRUCTS = {
              "constructs/001_HRF": "Harmonic-Resonance-Forest",
              "constructs/002_NECF": "Non-Equilibrium-Cognitive-Field",
              "constructs/003_TSP": "The-Schrodinger-Paradox",
              "constructs/004_AS": "Aether-SPARC",
              "constructs/005_FRAE": "FRAE",
              "constructs/006_TCA": "The-Cytomorphic-Architecture",
              "constructs/007_DDG": "Dreamer-Dark-Genesis",
              "constructs/008_CS": "causa-sui",
              "constructs/011_BA": "BSHDER-Architecture",
              "constructs/012_GGEO": "GENEVO-GENetic-EVolutionary-Organoid",
              "constructs/013_HM": "HAG-MoE"
          }
          
          for folder, repo in CONSTRUCTS.items():
              # Ensure standard internal hierarchy
              snap_path = os.path.join(folder, "snapshot")
              os.makedirs(snap_path, exist_ok=True)
              os.makedirs(os.path.join(folder, "notes"), exist_ok=True)
              os.makedirs(os.path.join(folder, "versions"), exist_ok=True)
              
              print(f"🚀 Archiving {repo} into {folder}...")
              
              success = False
              for branch in ['main', 'master']:
                  try:
                      readme_url = f"https://raw.githubusercontent.com/{GITHUB_USER}/{repo}/{branch}/README.md"
                      zip_url = f"https://github.com/{GITHUB_USER}/{repo}/archive/refs/heads/{branch}.zip"
                      
                      # Fetch the exact files
                      urllib.request.urlretrieve(readme_url, os.path.join(snap_path, "README.md"))
                      urllib.request.urlretrieve(zip_url, os.path.join(snap_path, f"{repo}.zip"))
                      
                      print(f"   ✅ Success ({branch})")
                      success = True
                      break
                  except Exception:
                      continue
              
              if not success:
                  print(f"   ❌ Failed to fetch assets for {repo}")
              
              time.sleep(2) # Respect GitHub API limits
          EOF
          python constructs_sync.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add constructs/
          git commit -m "Populate constructs folder with exact .zip and README snapshots" || echo "No changes to commit"
          git push origin main
