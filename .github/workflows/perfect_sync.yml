name: Perfect Invention Web Sync

on:
  workflow_dispatch: # Allows you to run this manually from the Actions tab

permissions:
  contents: write # Grants permission to push files directly to your repo

jobs:
  sync-archives:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Build Structure and Download Assets
        run: |
          cat << 'EOF' > web_sync.py
          import os
          import time
          import urllib.request
          import ssl
          
          ssl._create_default_https_context = ssl._create_unverified_context
          GITHUB_USER = "Devanik21"
          
          INVENTIONS = {
              "constructs/001_HRF": "Harmonic-Resonance-Forest",
              "constructs/002_NECF": "Non-Equilibrium-Cognitive-Field",
              "constructs/003_TSP": "The-Schrodinger-Paradox",
              "constructs/004_AS": "Aether-SPARC",
              "constructs/005_FRAE": "FRAE",
              "constructs/006_TCA": "The-Cytomorphic-Architecture",
              "constructs/007_DDG": "Dreamer-Dark-Genesis",
              "constructs/008_CS": "causa-sui",
              "constructs/011_BA": "BSHDER-Architecture",
              "constructs/012_GGEO": "GENEVO-GENetic-EVolutionary-Organoid",
              "constructs/013_HM": "HAG-MoE",
              "Misc/001_LIM": "Latent-Inference-Manifold",
              "Misc/002_LCM": "Latent-Consensus-Manifold",
              "Misc/003_XV": "xylia-vision"
          }
          
          PENDING = [
              "constructs/009_RHO", "constructs/010_LDD", 
              "Misc/004_LB", "Misc/005_TM", "Misc/006_DTM", 
              "Misc/007_AARGE", "Misc/008_DU"
          ]
          
          # 1. Process known repos
          for folder, repo in INVENTIONS.items():
              snap_path = os.path.join(folder, "snapshot")
              os.makedirs(snap_path, exist_ok=True)
              os.makedirs(os.path.join(folder, "notes"), exist_ok=True)
              os.makedirs(os.path.join(folder, "versions"), exist_ok=True)
              
              for branch in ['main', 'master']:
                  try:
                      readme = f"https://raw.githubusercontent.com/{GITHUB_USER}/{repo}/{branch}/README.md"
                      zip_url = f"https://github.com/{GITHUB_USER}/{repo}/archive/refs/heads/{branch}.zip"
                      
                      urllib.request.urlretrieve(readme, os.path.join(snap_path, "README.md"))
                      urllib.request.urlretrieve(zip_url, os.path.join(snap_path, f"{repo}.zip"))
                      print(f"✅ Synced {repo} ({branch})")
                      break
                  except Exception:
                      continue
              time.sleep(1)
              
          # 2. Build empty pending structures
          for folder in PENDING:
              os.makedirs(os.path.join(folder, "snapshot"), exist_ok=True)
              os.makedirs(os.path.join(folder, "notes"), exist_ok=True)
              os.makedirs(os.path.join(folder, "versions"), exist_ok=True)
              
          print("All downloads complete.")
          EOF
          python web_sync.py

      - name: Commit and Push to Web Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-synced exact .zip and README from all inventions via Web Action" || echo "No changes to commit"
          git push origin main
